# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-04-27"

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: current_class
    status: active
    owner_system: class-switch-system
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    interface: "ClassStateMachine.CurrentClass (read-only ClassDefinition property) + ClassStateMachine.ClassChanged event (Action<ClassDefinition>) + UnityEvent<ClassDefinition> inspector hook"
    write_access: class-switch-system-only
    referenced_by:
      - docs/architecture/adr-0001-class-switch-architecture.md
    added: 2026-04-27
    revised: ""

  - state: motor_position
    status: proposed
    owner_system: character-controller-2d
    adr: docs/architecture/adr-0002-character-controller-motor.md
    interface: "ICharacterMotor.Position (read-only Vector2 property) — Position は MovePosition + Physics2D.SyncTransforms() 適用後の値を返す。Cinemachine Camera follow / ability spawn point / VFX cue 位置参照のために read-only で公開"
    write_access: character-controller-2d-only
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""
    notes: "API 名は ADR-0002 Validation Gate V1 通過後に確定 revise"

  - state: motor_velocity
    status: proposed
    owner_system: character-controller-2d
    adr: docs/architecture/adr-0002-character-controller-motor.md
    interface: "ICharacterMotor.Velocity (read-only Vector2 property) — Cast slide + impulse 加算後の当該 FixedUpdate 最終値。Class Switch（ADR-0001）が空中切替時の連続性確認に read"
    write_access: character-controller-2d-only
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""
    notes: "API 名は ADR-0002 Validation Gate V1 通過後に確定 revise"

  - state: motor_grounded
    status: proposed
    owner_system: character-controller-2d
    adr: docs/architecture/adr-0002-character-controller-motor.md
    interface: "ICharacterMotor.IsGrounded (read-only bool property) — MotorState == Grounded のショートカット。ability 側で「接地中のみ可能なジャンプ」「空中ダッシュ消費」等の判定に read。external write は forbidden_patterns で禁止"
    write_access: character-controller-2d-only
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""

  - state: motor_facing
    status: proposed
    owner_system: character-controller-2d
    adr: docs/architecture/adr-0002-character-controller-motor.md
    interface: "ICharacterMotor.Facing (read-only Facing enum: Left / Right) — SpriteRenderer.flipX / ability spawn 方向 / camera offset 方向で参照。SetFacing(Facing) 経由でのみ書込可"
    write_access: character-controller-2d-only
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""

  - state: motor_state
    status: proposed
    owner_system: character-controller-2d
    adr: docs/architecture/adr-0002-character-controller-motor.md
    interface: "ICharacterMotor.State (read-only MotorState enum: Grounded / Airborne / WallSliding / Pinned) — Animator parameter driver / ability 可否判定 / SE トリガで参照。StateChanged event でも通知"
    write_access: character-controller-2d-only
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""

