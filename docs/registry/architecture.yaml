# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: class_switch_notification
    status: active
    pattern: csharp_event
    producer: class-switch-system
    consumers:
      - hud
      - ability-executor
      - vfx-system   # confirmed by ADR-0003 (was vfx-system-future placeholder)
      - audio-system-future
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    signal_signature: "ClassChanged(ClassDefinition newClass) — C# event Action<ClassDefinition>; also exposed as UnityEvent<ClassDefinition> for inspector-driven hooks"
    referenced_by:
      - docs/architecture/adr-0001-class-switch-architecture.md
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: 2026-04-27   # vfx-system-future → vfx-system 確定参照化

  - contract: motor_intent_command
    status: proposed
    pattern: direct_call
    producer: ability-executor
    consumers:
      - character-controller-2d
      - combat-system  # ADR-0009: ApplyHitstop(HitstopSec) を攻撃側 motor に呼出（HitConfirmed callback から）
    adr: docs/architecture/adr-0002-character-controller-motor.md
    signal_signature: |
      ICharacterMotor methods (synchronous, FixedUpdate-deferred):
        RequestImpulse(Vector2 impulse)                      — 1 frame additive
        OverrideGravity(float multiplier, float durationSec) — multiplier 後勝ち、durationSec max 合成
        LockHorizontalControl(float durationSec)             — 長い方優先で合成
        ApplyHitstop(float durationSec)                      — 自身 Solver 停止 (CD1 Tier 0 内蔵)。Mathf.Max 合成で二重呼出しも安全
        SetFacing(Facing direction)                          — 向き強制
    additional_consumers_future:
      - class-switch-system  # 切替 invariant 維持時の SetFacing / 状態 read のみ
      - enemy-ai-future      # 敵側で同 motor 抽象を再利用候補（Tier 1 EnemyController）
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""
    notes: "API 名は ADR-0002 Validation Gate V1 通過後に確定 revise"

  - contract: motor_event_notification
    status: proposed
    pattern: csharp_event
    producer: character-controller-2d
    consumers:
      - ability-executor
      - animator-driver
      - vfx-system   # confirmed by ADR-0003 (was vfx-system-future placeholder)
      - audio-system-future
    adr: docs/architecture/adr-0002-character-controller-motor.md
    signal_signature: |
      ICharacterMotor events (C# event Action<...>):
        Landed(Vector2)         — arg: impact velocity (着地時のみ)
        JumpStarted              — no args
        WallTouched(Vector2)    — arg: wall normal
        HitstopApplied(float)   — arg: duration sec
        StateChanged(MotorState) — arg: 新 state (Grounded/Airborne/WallSliding/Pinned)
      `Grounded` event は廃案 — Landed(Vector2) で着地検出は十分、IsGrounded プロパティとの命名衝突回避
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: 2026-04-27   # vfx-system-future → vfx-system 確定参照化（ADR-0003）

  - contract: vfx_publisher
    status: proposed
    pattern: direct_call
    producer: any-gameplay-system
    consumers:
      - vfx-system
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    signal_signature: |
      IVFXPublisher methods (synchronous, hot-path budget ≤ 0.2ms / call, 0-byte GC alloc):
        PlayCue(VfxCueDefinition cue, in VfxCueArgs args) : void
            — fire-and-forget. caller does not own lifetime. cold-miss は silent drop + counter
        SpawnCue(VfxCueDefinition cue, in VfxCueArgs args) : VfxHandle
            — persistent / cancellable cue（burning aura 等）。VfxHandle は Cancel / MoveTo / IsAlive を提供
        SubscribeMotorEvents(ICharacterMotor motor) : void
            — Tier 1 wiring。motor の Landed → dust_landed cue、HitstopApplied → hitstop_freeze_frame cue を自動 bind
      VfxCueArgs is readonly struct (WorldPos / AttachTo / Direction / TintOverride / ScaleMult)
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

  - contract: vfx_cue_definition
    status: proposed
    pattern: shared_resource
    producer: vfx-system
    consumers:
      - any-gameplay-system   # 各 system は VfxCueDefinition を SerializeField で参照して PlayCue に渡す
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    signal_signature: |
      VfxCueDefinition is ScriptableObject (one asset per cue under assets/vfx/cues/):
        CueId : string                          — debug only, not used as runtime key
        PrefabRef : AssetReferenceGameObject    — Addressables async load
        MaxConcurrent : int                     — per-cue cap (anti-spam)
        DefaultLifetimeSec : float              — Watchdog timeout = DefaultLifetimeSec * 1.5
        PreloadOnSceneLoad : bool               — hot cue は true 必須（cold-miss 回避）
        Layer : VfxLayer { World, Overlay, UI } — sorting hint
        Overflow : OverflowPolicy { DropOldest, DropNewest }
        AttachPolicy : AttachPolicy { WorldSpace, AttachToTransform }
      Designer は SO asset 作成のみで cue 追加可能（コード編集不要）
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

  - contract: save_data_lifecycle
    status: proposed
    pattern: direct_call
    producer: game-state-machine   # ADR-0005 future が trigger orchestration 所管
    consumers:
      - save-data-system           # SaveAll / LoadAll を受ける passive service
    adr: docs/architecture/adr-0004-save-data-system.md
    signal_signature: |
      ISaveDataService methods (async, off-frame I/O):
        SaveAllAsync(int slot, CancellationToken) : Task<SaveLifecycleEventArgs>
            — caller must await; .Result / .Wait() 禁止 (Unity SynchronizationContext deadlock)
        LoadAllAsync(int slot, CancellationToken) : Task<SaveLifecycleEventArgs>
            — gameplay scene loaded precondition (R-I); 違反時 SaveSequenceException throw
      Events (subscribers: ADR-0005 UI / ADR-0006 rebinding confirm):
        SaveCompleted(SaveLifecycleEventArgs) : Action<>
        LoadCompleted(SaveLifecycleEventArgs) : Action<>
      SaveLifecycleEventArgs: { Slot, Success, Error, Duration }
    referenced_by:
      - docs/architecture/adr-0004-save-data-system.md
    added: 2026-04-27
    revised: ""

  - contract: saveable_contract
    status: proposed
    pattern: direct_call
    producer: any-gameplay-system   # 各 system が ISaveable 実装
    consumers:
      - save-data-system           # SaveDataService が reflection scan で発見・呼出
    adr: docs/architecture/adr-0004-save-data-system.md
    signal_signature: |
      ISaveable (library-agnostic POCO contract):
        SectionId : string                — "player" / "world" / "settings" / "meta"
        SchemaVersion : int               — current schema version this saveable produces
        Capture() : SaveSection           — read-only API 経由で snapshot 生成
        Restore(SaveSection) : void       — 復元、scene-loaded 前提

      Registration: [RegisterSaveable(loadOrder)] attribute + reflection scan ONLY.
      Explicit Register() / DI 注入は forbidden (cyclic asmdef 防止)。

      SaveSection POCO:
        SectionId : string
        SchemaVersion : int
        Data : Dictionary<string, object> — primitive / string / bool / List<T> /
                                            Dictionary<string,T> / [Serializable] POCO のみ
                                            Vector2/Vector3/Color の object 直接格納禁止
                                            （JObject に化けて Get<T> が silent default を返す）
    referenced_by:
      - docs/architecture/adr-0004-save-data-system.md
    added: 2026-04-27
    revised: ""

  - contract: cloud_sync_contract
    status: proposed
    pattern: direct_call
    producer: save-data-system
    consumers:
      - cloud-sync-impl            # Tier 0: NullCloudSync, Tier 2a: SteamCloudSync (別 asmdef)
    adr: docs/architecture/adr-0004-save-data-system.md
    signal_signature: |
      ICloudSync (Tier 0 から interface 配備、実装は Tier 2a 注入):
        IsAvailable : bool
        UploadAsync(slotKey, byte[] data, CancellationToken) : Task
        DownloadAsync(slotKey, CancellationToken) : Task<byte[]>
        GetRemoteTimestampAsync(slotKey, CancellationToken) : Task<DateTime?>

      Tier 0 default: NullCloudSync (no-op, IsAvailable=false)
      Tier 2a: SteamCloudSync : ICloudSync (Steamworks.NET ISteamRemoteStorage、Game.SteamCloud.asmdef)
    referenced_by:
      - docs/architecture/adr-0004-save-data-system.md
    added: 2026-04-27
    revised: ""

  - contract: input_service_lifecycle
    status: proposed
    pattern: direct_call
    producer: game-state-machine    # ADR-0006 future が SetActiveMap orchestration
    consumers:
      - input-system                # InputService が SetActiveMap 受信、Action Map 切替実施
    adr: docs/architecture/adr-0005-input-system-architecture.md
    signal_signature: |
      IInputService methods:
        ActiveMaps : ActionMapId (read-only) — bit flags の現在 active map set
        LastUsedDevice : InputDeviceKind (read-only) — 最終 input device
        SetActiveMap(ActionMapId maps) : void
            — replace active map flags; not in flags の map は disable
            — Game State Machine (ADR-0006) の唯一 routing 入口
        EnableMap(ActionMapId map) : void  — map を active set に追加
        DisableMap(ActionMapId map) : void — map を active set から削除
        SaveBindings(SaveSection section) : void
            — rebinding overrides を SettingsSaveable 経由で永続化（ADR-0004 連携）
            — 内部: _controls.SaveBindingOverridesAsJson() を Data["rebinding"] 格納
        RestoreBindings(SaveSection section) : void
            — section から rebinding overrides を復元
            — Awake 順序 race 対策の null check 内蔵
      Events:
        ActiveDeviceChanged(InputDeviceKind) : Action<>
            — last-used device 変化時 (Gamepad ↔ Keyboard) 発火、UI が glyph swap 用に subscribe

      ActionMapId enum (bit flags, [System.Flags]):
        None = 0, Gameplay = 1, UI = 2, Pause = 4, Dialogue = 8
        値は ADR-0006 が継承 redefine 不可、Tier 1 で Cinematic = 16 等を append のみ可能
    referenced_by:
      - docs/architecture/adr-0005-input-system-architecture.md
    added: 2026-04-28
    revised: ""

  - contract: camera_follow_minimal
    status: proposed
    pattern: direct_call
    producer: any-gameplay-system   # Game State Machine future / scene bootstrap が SetFollowTarget / SetConfiner を呼出
    consumers:
      - camera-system               # ADR-0006 provisional 実装が API を提供
    adr: docs/architecture/adr-0006-camera-system.md
    signal_signature: |
      Minimal camera surface (provisional, post-R1 spike refinement target):
        SetFollowTarget(ICharacterMotor motor) : void
            — Camera follow target source binding。Cinemachine への transform bridge 実装方式は
              R1 spike + ADR-0002 V1 通過後に follow-up ADR で確定（CharacterFollowProxy /
              ICharacterMotor.TransformReadProxy 提案 / 他案）
        SetConfiner(Collider2D boundingShape) : void
            — MVP は単一 PolygonCollider2D を CinemachineConfiner2D.BoundingShape2D に Inspector
              アサイン直接設定でも可、API 形式は VS multi-room 対応時の room transition 仕様確定後
              に extend
      Full ICameraDirector surface (FixedPoint / Composite / RequestShake* / CancelAllShakes /
      CameraMoved / Snapshot) は **deferred** — ADR-0006 D4 で follow-up ADR に持ち越し
      （observability API は CinemachineBrain.OutputCamera.transform 経由再設計、shake API は
       CinemachineImpulseSource backing model 確定後）。
    referenced_by:
      - docs/architecture/adr-0006-camera-system.md
    added: 2026-04-28
    revised: ""
    notes: "本 entry は ADR-0006 thin provisional に対応。follow-up ADR で full ICameraDirector surface 確定時に supersede 予定"

  - contract: input_event_stream
    status: proposed
    pattern: csharp_event
    producer: input-system
    consumers:
      - combo-input-buffer        # systems-index #9
      - class-switch-system       # ADR-0001 SwitchTo input handler
      - character-controller-2d   # ADR-0002 motor input (via ability layer)
      - ability-executor          # ADR-0007 future
      - ui-system                 # IUIInputProxy 経由（ADR-0006 確定後）
    adr: docs/architecture/adr-0005-input-system-architecture.md
    signal_signature: |
      IInputEventStream:
        InputReceived(InputEvent) : Action<>
            — global input event stream、全 InputAction の started/performed/canceled を配信
        Subscribe(string actionName, Action<InputEvent> handler) : void
            — specific action 専用購読（convenience）
        Unsubscribe(string actionName, Action<InputEvent> handler) : void
            — OnEnable / OnDisable pair で必須

      InputEvent (readonly struct):
        ActionName : string         — "attack" / "class_switch_left" 等 snake_case
        Phase : InputPhase enum     — Started / Performed / Canceled
        Timestamp : float           — (float)CallbackContext.time, double 精度（M3 fix）
        Value : float               — analog action 値
        Vector2Value : Vector2      — Vector2 action 値
        Device : InputDeviceKind    — Keyboard / Mouse / Gamepad
        BindingIndex : int          — primary / alt binding 識別、-1 ガード済み（M2 fix）

      Forbidden: gameplay code から InputAction.performed += を直接 subscribe 禁止
                  （direct_inputaction_subscribe forbidden）
    referenced_by:
      - docs/architecture/adr-0005-input-system-architecture.md
    added: 2026-04-28
    revised: ""

  - contract: combo_buffer_query
    status: proposed
    pattern: direct_call
    producer: combo-input-buffer
    consumers:
      - ability-executor          # TryConsume("attack") 等で先行入力消費
      - class-switch-system       # TryConsume で職業間受け渡し確認
    adr: docs/architecture/adr-0007-combo-input-buffer.md
    signal_signature: |
      IComboBuffer methods (synchronous, O(16) = O(1), 0 byte GC alloc):
        TryConsume(string actionName) : bool
            — window 内の最新未消費エントリを consumed=true にして true 返す。なければ false
            — Latest-first セマンティクス: 同一アクション連打時は最新 Timestamp のエントリを消費
            — 1 回の呼出で最大 1 エントリを消費する（複数エントリがあっても最新のみ）
        Flush() : void
            — 全エントリをクリア（death / respawn / level reset）
            — クラス切替時は呼ばない（職業間受け渡しのため）
            — Game State Machine のみ呼出すこと（forbidden_pattern: flush_on_non_gsm_caller）
    referenced_by:
      - docs/architecture/adr-0007-combo-input-buffer.md
    added: 2026-04-29
    revised: ""

  - contract: ability_hit_contract
    status: proposed
    pattern: csharp_event
    producer: ability-executor
    consumers:
