# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: class_visual_swap
    status: active
    api: "SpriteLibrary.spriteLibraryAsset = newSLA + SpriteResolver.ResolveSpriteToRenderer() (com.unity.2d.animation 10.x — exact API names pending Editor verification per ADR-0001 Validation Gate)"
    not: "Animator.Play() / SetBool() / Animator parameter triggers"
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    reason: "Animator state changes reflect on the next frame, breaking Pillar 1 `切替が、花になる` 1-frame visual sync requirement. SpriteLibrary direct asset swap + SpriteResolver explicit resolve completes within the same frame as input."
    referenced_by:
      - docs/architecture/adr-0001-class-switch-architecture.md
    added: 2026-04-27
    revised: ""

  - purpose: kinematic_motor_solver
    status: proposed
    api: "Kinematic Rigidbody2D + Rigidbody2D.Cast() / Collider2D.Cast() with pre-allocated RaycastHit2D[] + ContactFilter2D + Rigidbody2D.MovePosition() once per FixedUpdate + explicit Physics2D.SyncTransforms() (Unity 6.3 Box2D v3, exact overload names pending Editor verification per ADR-0002 Validation Gate V1)"
    not: "Dynamic Rigidbody2D + AddForce / linearVelocity direct write / Physics2D.autoSyncTransforms = true"
    adr: docs/architecture/adr-0002-character-controller-motor.md
    reason: "Pillar 3 「歯ごたえ」 demands precise air control / coyote time / jump buffer / wall slide which Dynamic + linearDamping cannot deliver within Tier 0 6 weeks. Solver authority on the motor side + 1 frame 1 solve invariant + intent-based ICharacterMotor API prevents A2 bidirectional coupling structurally. Physics2D.autoSyncTransforms is deprecated in Unity 6.3 — explicit SyncTransforms required after MovePosition for Box2D v3 multithread safety."
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""
    notes: "API 名は ADR-0002 Validation Gate V1 通過後に確定 revise"

