    status: proposed
    owner_system: combo-input-buffer
    adr: docs/architecture/adr-0007-combo-input-buffer.md
    interface: "IComboBuffer — TryConsume(actionName: string): bool（最新未消費エントリを消費、Latest-first セマンティクス） / Flush(): void（全クリア、Game State Machine のみ呼出）。内部の _actionNames[] / _timestamps[] / _consumed[] 配列は外部不可視、IComboBuffer 経由のみアクセス"
    write_access: combo-input-buffer-only
    referenced_by:
