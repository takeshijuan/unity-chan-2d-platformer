            — Configure(ClassAbilityData[]) 後に即座に新クラスの capability を返す
    referenced_by:
      - docs/architecture/adr-0008-class-abilities-system.md
    added: 2026-04-29
    revised: ""
    notes: "Gate & Lock レベルデータ（将来 ADR）は AbilityCapability enum 値で開閉条件を記述。string HasAbility 方式は forbidden（ability_string_action_name_gate 参照）"

