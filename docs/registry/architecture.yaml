    revised: ""
    notes: "ClassStateMachine (ADR-0001) は Configure(ClassAbilityData[]) 経由で ability set を差し替える。HitConfirmed event で Combat System に衝突情報を渡す。ExecutionOrder -60（ADR-0007 R11: ComboInputBuffer -80 より後）"

