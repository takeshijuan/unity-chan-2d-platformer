# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: class_visual_swap
    status: active
    api: "SpriteLibrary.spriteLibraryAsset = newSLA + SpriteResolver.ResolveSpriteToRenderer() (com.unity.2d.animation 10.x — exact API names pending Editor verification per ADR-0001 Validation Gate)"
    not: "Animator.Play() / SetBool() / Animator parameter triggers"
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    reason: "Animator state changes reflect on the next frame, breaking Pillar 1 `切替が、花になる` 1-frame visual sync requirement. SpriteLibrary direct asset swap + SpriteResolver explicit resolve completes within the same frame as input."
    referenced_by:
      - docs/architecture/adr-0001-class-switch-architecture.md
    added: 2026-04-27
    revised: ""

  - purpose: kinematic_motor_solver
    status: proposed
    api: "Kinematic Rigidbody2D + Rigidbody2D.Cast() / Collider2D.Cast() with pre-allocated RaycastHit2D[] + ContactFilter2D + Rigidbody2D.MovePosition() once per FixedUpdate + explicit Physics2D.SyncTransforms() (Unity 6.3 Box2D v3, exact overload names pending Editor verification per ADR-0002 Validation Gate V1)"
    not: "Dynamic Rigidbody2D + AddForce / linearVelocity direct write / Physics2D.autoSyncTransforms = true"
    adr: docs/architecture/adr-0002-character-controller-motor.md
    reason: "Pillar 3 「歯ごたえ」 demands precise air control / coyote time / jump buffer / wall slide which Dynamic + linearDamping cannot deliver within Tier 0 6 weeks. Solver authority on the motor side + 1 frame 1 solve invariant + intent-based ICharacterMotor API prevents A2 bidirectional coupling structurally. Physics2D.autoSyncTransforms is deprecated in Unity 6.3 — explicit SyncTransforms required after MovePosition for Box2D v3 multithread safety."
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""
    notes: "API 名は ADR-0002 Validation Gate V1 通過後に確定 revise"

  - purpose: vfx_particle_backbone
    status: proposed
    api: "Legacy ParticleSystem (UnityEngine.ParticleSystem) — IVFXPublisher 抽象越しに将来 VFX Graph 移行可能"
    not: "VFX Graph (UnityEngine.VFX) を Tier 1 で primary backbone にしない / Hybrid backbone （hero=VFX Graph + cheap=Legacy）構成"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    reason: "Unity 6.3 で Legacy ParticleSystem は deprecated 表示だが機能は維持、削除時期未公表。VFX Graph は URP 2D Output Particle Sprite 統合に caveats（Sub-emitter / Trail Renderer 2D 連携不足）、現スコープ（20 emitter）に対して GPU/compute は overkill。IVFXPublisher 抽象により後日 cue 単位で backbone swap 可能なので将来移行を阻害しない。"
    revisit_trigger: "Unity 6.4 LTS が Legacy ParticleSystem の削除予告アナウンスを出した時点 / VFX Graph URP 2D 統合の caveats 解消時"
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

  - purpose: vfx_color_wash_technique
    status: proposed
    api: "CinemachineBrain 直下の Animated Quad（child Transform）+ Sprite_ColorWash.shadergraph（_RadialCenter Vector2 / _Progress 0..1 / _BaseColor Color プロパティ）、Sorting Layer 'VFX_Overlay'（World < VFX_Overlay < UI Canvas の順）"
    not: "Camera.OnRenderImage() （URP 6.3 で動作不可）/ ScriptableRendererFeature + RenderGraph custom pass（学習コスト過大）/ Volume framework Color Adjustments override（放射状グラデーション不可）/ Per-sprite tint のみ（Pillar 1 報酬感不足）"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    reason: "art-bible.md に既存 custom shader budget として Sprite_ColorWash.shadergraph が枠取り済み（line 1592）。Animated Quad アプローチは Render Pipeline カスタマイズ不要、Steam Deck で 0.1-0.3ms、HUD マスクは Sorting Layer で除外（脆弱な render-pass exclusion 不要）。art-bible.md line 1077-1079 の `Render Texture マスク` 表現は本決定で supersede。"
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

  - purpose: vfx_cold_miss_policy
    status: proposed
    api: "Silent drop + Debug.Log warning [Conditional UNITY_EDITOR] + ColdMissCount[cue] counter increment。hot cue は VfxCueDefinition.PreloadOnSceneLoad = true を契約化"
    not: "Addressables.WaitForCompletion() で同期 stall / queue → load 完了後の delayed fire"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    reason: "Pillar 1 の 1-frame 視覚同期を最優先。WaitForCompletion は初回 10-50ms hitch、queue は stale な visual feedback で入力同期破綻。silent drop はプロファイラで検出可能、CI smoke test で「playable scene 5 anchor cue で cold-miss = 0」をアサート可能。"
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

  - purpose: vfx_addressables_key_form
    status: proposed
    api: "AssetReferenceGameObject in VfxCueDefinition (ScriptableObject SerializeField)"
    not: "enum VfxCueId（cue 追加でコード編集必須）/ string addressable key（typo がコンパイル通過、Find References 不能）"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    reason: "型安全性 + Find References 動作 + refactor-rename 動作 + デザイナーが SO asset 作成のみで cue 追加可能（コード編集不要）。technical-preferences.md「Magic numbers — ScriptableObject に配置」と同思想。"
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

