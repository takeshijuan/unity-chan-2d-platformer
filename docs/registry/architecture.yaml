# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: animator_play_for_class_switch
    status: active
    description: "職業切替の即時視覚変更を Animator.Play() / SetBool() / Animator parameter trigger で期待してはいけない。視覚切替には SpriteLibrary + SpriteResolver の同フレーム経路を使うこと。"
    why: "Animator state mutations are reflected at the next frame transition, introducing a 1-frame visual lag. Pillar 1 `切替が、花になる` design test explicitly rejects any switching cost or delay."
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    added: 2026-04-27

  - pattern: component_swap_per_class
    status: active
    description: "職業ごとに別の MonoBehaviour Controller (`SwordsmanController` / `ArcherController` etc.) を作って enable/disable で切替えてはいけない。ClassDefinition (ScriptableObject) + ClassStateMachine + AbilityExecutor の三分割を使うこと。"
    why: "Per-class MonoBehaviour Controllers tend to absorb ability + combat + movement + VFX trigger responsibility, becoming God Objects. This violates systems-index.md Architecture Note A1 (Class Abilities God Object prevention) and makes 4-class extension a linear-or-worse code duplication problem."
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    added: 2026-04-27

  - pattern: external_motor_state_write
    status: proposed
    description: "外部システム（ability / combat / camera / AI / UI 等）が CharacterController2D の内部状態（Rigidbody2D.linearVelocity / Transform.position / Rigidbody2D.gravityScale / IsGrounded flag / MotorState 等）を直接 write してはいけない。状態変更は ICharacterMotor の意図ベース command（RequestImpulse / OverrideGravity / LockHorizontalControl / ApplyHitstop / SetFacing）経由のみ。"
    why: "systems-index.md Architecture Note A2 で確定。直接 write は (a) Solver 権威性 1 frame 1 solve invariant を破壊、(b) Box2D v3 マルチスレッドの SyncTransforms タイミング保護を貫けない、(c) ability ↔ motor 双方向結合により Class Abilities が God Object 化する drift を招く。意図 API 経由のみの拘束を interface レベルで強制（ICharacterMotor に setter なし、Rigidbody2D 参照を Game.Core.asmdef 内に閉じ込め）。"
    adr: docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27

  - pattern: multi_movePosition_per_fixedupdate
    status: proposed
    description: "同一 FixedUpdate サイクル内で Rigidbody2D.MovePosition() を複数回呼び出してはいけない。motor の Solver が 1 FixedUpdate 1 solve で完結し、最終位置を 1 回だけ MovePosition に渡す invariant を維持する。"
    why: "Multi-call は最後の値で上書きされ、中間 Solver 結果が破棄される。R2 invariant（1 frame 1 solve、ADR-0002 Decision）違反。Box2D v3 マルチスレッドにおいても予測可能性が崩れる。テストで境界（同 FixedUpdate 内 MovePosition 1 回のみ）を assert する。"
    adr: docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27

  - pattern: physics2d_autoSyncTransforms
    status: proposed
    description: "Physics2D.autoSyncTransforms = true の使用を禁止。MovePosition 後は Physics2D.SyncTransforms() を明示的に呼び出すこと。"
    why: "Unity 6.3 で Physics2D.autoSyncTransforms は deprecated（6.5 で削除予定）。明示呼出により Box2D v3 マルチスレッド環境で「MovePosition → SyncTransforms → 次 Cast クエリ」の sequence を制御可能、race を回避できる。docs/engine-reference/unity/breaking-changes.md および deprecated-apis.md 参照。"
    adr: docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27

  - pattern: vfx_writes_motor_state
    status: proposed
    description: "VFX System が ICharacterMotor の状態（Position / Velocity / IsGrounded / Facing / State）を直接 write してはいけない。VFX は motor の event notification を subscribe するのみで、state mutation は禁止。"
    why: "ADR-0002 で確定した motor write authority の排他性（character-controller-2d-only）を維持し、replay 安全性（gameplay state の決定論性）を保つ。VFX が motor 状態を mutate すると particle seed の非決定性が gameplay に漏れる。"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27

  - pattern: vfx_camera_onrenderimage
    status: proposed
    description: "Camera.OnRenderImage() を使った post-effect（Color Wash 含む）の実装を禁止。"
    why: "Unity 6.3 で URP Compatibility Mode が完全削除されたため、URP 2D Renderer で Camera.OnRenderImage は呼ばれない。art-bible.md line 1077-1079 の `Render Texture マスク` 旧仕様は ADR-0003 で Sorting Layer 'VFX_Overlay' + Animated Quad アプローチに supersede。docs/engine-reference/unity/breaking-changes.md (lines 154-167) 参照。"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27

  - pattern: vfx_renderpipeline_compatibilitymode
    status: proposed
    description: "URP Compatibility Mode (`UniversalRenderPipelineGlobalSettings.enableRenderCompatibilityMode = true`) の使用を禁止。RenderGraph API ベースの新パターンを使うこと。"
    why: "Unity 6.3 で完全削除済み。enableRenderCompatibilityMode は read-only かつ常に false を返す。Compatibility Mode に依存した render pass / volume effect は機能しない。docs/engine-reference/unity/breaking-changes.md (lines 154-167) 参照。"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27

  - pattern: vfx_synchronous_waitforcompletion
    status: proposed
    description: "IVFXPublisher.PlayCue の hot path で Addressables.WaitForCompletion() を呼んではいけない。cold-miss 時は silent drop + counter で対応。"
    why: "WaitForCompletion は初回ロード時に 10-50ms の frame hitch を引き起こし、Pillar 1「切替が、花になる」1-frame 視覚同期を破壊する。hot cue は VfxCueDefinition.PreloadOnSceneLoad = true で回避、レアな cue は cold-miss 許容（プロファイラで検出可能、CI smoke test で 0 をアサート）。"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27

  - pattern: vfx_global_pool
    status: proposed
    description: "VFX 全体で 1 つのグローバル GameObject Stack を共有する pool 構造を禁止。Per-cue pool（Dictionary<VfxCueDefinition, Stack<PooledVfxInstance>>）を使うこと。"
    why: "cue ごとに prefab root 構造（ParticleSystem / Trail Renderer / Sub-emitter / SpriteRenderer 構成）が異なるため、グローバル pool は reset コストが高くバグの温床。typed bucket（per-cue pool）と運用上等価で API もクリーンに保てる。"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27

  - pattern: playerprefs_for_save_data
    status: proposed
    description: "PlayerPrefs.SetInt/SetFloat/SetString による save data 永続化を禁止（settings の volume / language / **Input rebinding 含む**）。Save Data System の SettingsSaveable 経由のみ許可（rebinding は SettingsInputSaveable.Capture が IInputService.SaveBindings 経由で SaveBindingOverridesAsJson() を Data['rebinding'] verbatim 格納）。"
    why: "PlayerPrefs は Steam Cloud 同期外、Windows Registry 依存で破損しやすい。technical-preferences.md line 65 で forbidden 化。Roslyn analyzer rule で gameplay assembly + Game.Input から build error 化。ADR-0005 で Input domain 拡張、engine-reference/modules/input.md lines 269-275 の旧 `PlayerPrefs.SetString('InputBindings', rebinds)` example を supersede。"
    adr: docs/architecture/adr-0004-save-data-system.md
    referenced_by:
      - docs/architecture/adr-0004-save-data-system.md
      - docs/architecture/adr-0005-input-system-architecture.md
    added: 2026-04-27
    revised: 2026-04-28   # ADR-0005 で Input rebinding を含むことを明記、referenced_by 追記

  - pattern: binaryformatter_for_save_data
    status: proposed
    description: "System.Runtime.Serialization.Formatters.Binary.BinaryFormatter を save data 用途で使用してはいけない。全面禁止。"
    why: ".NET 8 で deprecated（CA2300 SecurityException）、デシリアライズ時の任意コード実行 security risk、grep / diff 不能でデバッグ困難、schema migration が手動オフセット計算で fragile。"
    adr: docs/architecture/adr-0004-save-data-system.md
    added: 2026-04-27

  - pattern: jsonutility_for_save_data
    status: proposed
    description: "Unity 標準 JsonUtility.ToJson / FromJson を save data 用途で使ってはいけない。Newtonsoft.Json for Unity (com.unity.nuget.newtonsoft-json) のみ採用。"
    why: "JsonUtility は Dictionary<,> 直接非対応 / polymorphism 不可 / [SerializeReference] でも circular ref 不可。Save Data の section-based JSON（player/world/settings/meta）と rebinding（Input Actions JSON polymorphic struct）が成立しない。"
    adr: docs/architecture/adr-0004-save-data-system.md
    added: 2026-04-27

  - pattern: vfx_state_in_save_document
    status: proposed
    description: "SaveSection.Data に vfx_pool_state / vfx_cue_handles / VfxHandle.Id 等 VFX 内部状態を含めてはいけない。VFX は gameplay state から replay 派生する。"
    why: "ADR-0003 が VFX を replay-safe としたため、save に永続化すると (a) cancelled cue が load 後に蘇る、(b) VfxHandle.Id は process-local で別 process では invalid、(c) particle 内部状態は非決定的で replay 不再現。Save Data 復元時は ICharacterMotor.Teleport / ClassStateMachine.SwitchTo の SystemRestore 経由で gameplay 状態のみ復元、VFX は scene の通常起動経路で発火。"
    adr: docs/architecture/adr-0004-save-data-system.md
    added: 2026-04-27

  - pattern: save_waitforcompletion_in_hot_path
    status: proposed
    description: "SaveDataService.SaveAll / LoadAll の hot path で Addressables.WaitForCompletion() / Task.Result / Task.Wait() を呼んではいけない。async/await + ConfigureAwait(false) のみ許可。"
    why: "Unity SynchronizationContext は single-threaded のため Task.Result / Wait() は deadlock 確実。WaitForCompletion は初回ロード時に 10-50ms hitch、メインスレッドブロックで frame skip。Save / Load は I/O off-frame envelope だがメインスレッドブロックは UI freeze として観測される。"
    adr: docs/architecture/adr-0004-save-data-system.md
    added: 2026-04-27

  - pattern: explicit_register_saveable
    status: proposed
    description: "ISaveable を SaveDataService に登録する方法は [RegisterSaveable] attribute + reflection scan のみ許可。明示的 SaveDataService.Register(ISaveable) 呼出 / DI コンテナ注入は禁止。"
    why: "Game.Core.asmdef (ISaveable) → Game.Gameplay.asmdef (実装) → Game.Persistence.asmdef (登録) の triangle が cyclic asmdef 化するリスク。reflection scan + attribute による IoC で循環依存を構造的に防止（B3 fix from TD-ADR review）。LoadOrder は attribute parameter で制御可能。"
    adr: docs/architecture/adr-0004-save-data-system.md
    added: 2026-04-27

  - pattern: legacy_input_class_usage
    status: proposed
    description: "UnityEngine.Input.GetKey / GetKeyDown / GetMouseButton / GetAxis / Input.mousePosition 等の Legacy Input class 全面禁止。com.unity.inputsystem 1.8+ の InputAction / IInputEventStream のみ使用可。"
    why: "Unity 6 で Legacy Input class は deprecated（engine-reference/breaking-changes.md line 38-50、deprecated-apis.md line 10-20）。技術選定として Input System Package が確定（technical-preferences.md line 77）。Roslyn analyzer rule で Game.* assembly から build error 化、Assets/Plugins/ThirdParty/ は除外。"
    adr: docs/architecture/adr-0005-input-system-architecture.md
    added: 2026-04-28

  - pattern: playerprefs_for_binding
    status: proposed
    description: "Input System の rebinding 永続化に PlayerPrefs を使用してはいけない。SettingsInputSaveable 経由（ADR-0004 SaveSection）で永続化のみ許可。"
    why: "ADR-0004 forbidden `playerprefs_for_save_data` の Input domain 拡張。engine-reference/modules/input.md lines 269-275 の `PlayerPrefs.SetString('InputBindings', rebinds)` example は本 ADR で supersede。Steam Cloud 同期外、Windows Registry 依存で破損しやすい。Roslyn analyzer rule で gameplay assembly + Game.Input から build error 化。"
    adr: docs/architecture/adr-0005-input-system-architecture.md
    added: 2026-04-28

  - pattern: magic_string_action_name
    status: proposed
    description: "PlayerInput component の 'Send Messages' / 'Broadcast Messages' Behavior mode 禁止。Generated C# class ('Generate C# Class' Inspector option) + 型安全な action access のみ採用。"
    why: "Send Messages mode は magic string method 名（'OnAttack' / 'OnJump' 等）に依存し typo がコンパイル通過、runtime fail。Find References 不能、refactor 安全性ゼロ、IL2CPP で reflection-based dispatch のパフォーマンス hit。長期メンテナンスプロジェクトに不適。"
    adr: docs/architecture/adr-0005-input-system-architecture.md
    added: 2026-04-28

  - pattern: direct_inputaction_subscribe
    status: proposed
    description: "gameplay assembly (Game.Gameplay / Game.UI 等) から InputAction.performed / .started / .canceled に直接 subscribe してはいけない。IInputEventStream.InputReceived event または IInputEventStream.Subscribe(actionName, handler) 経由のみ許可。"
    why: "直接 subscribe は gameplay code を Unity Input System にタイトに結合させ、Action 名変更で gameplay code 大量修正、Combo Input Buffer (#9) 等の中間層を bypass、unit test に Input System mock 必須化。IInputEventStream 抽象で疎結合 + 同等性能を実現。Roslyn analyzer rule で `Game.Gameplay.asmdef` 内の `InputAction.performed +=` を build error 化。"
    adr: docs/architecture/adr-0005-input-system-architecture.md
    added: 2026-04-28

  - pattern: hover_only_ui_component
    status: proposed
    description: "UI component が IPointerEnterHandler を implements する場合、必ず ISelectHandler または ISubmitHandler も implements すること。例外は [GamepadAccessibilityExempt] attribute を付与した component のみ（Tooltip / drag handle / scroll indicator / context menu hover preview 等）。"
    why: "technical-preferences.md line 23 で「ホバー専用インタラクションは禁止」「全 UI は d-pad/スティック で操作可能」と確定。Steam Deck Verified 申請の必須拘束。Roslyn analyzer rule で Game.UI / Game.Gameplay assembly から build error 化、`[GamepadAccessibilityExempt]` で明示的 opt-out のみ許容（PR review 必須）。"
    adr: docs/architecture/adr-0005-input-system-architecture.md
    added: 2026-04-28

  - pattern: flush_combo_buffer_on_class_switch
    status: proposed
    description: "クラス切替（ClassStateMachine.SwitchTo）時に IComboBuffer.Flush() を呼んではいけない。職業間受け渡し（class switch 中に先行入力したコンボを次クラスが拾う）が機能しなくなる。Flush は death / respawn / level reset 時に Game State Machine のみが呼出す。"
    why: "Pillar 3「歯ごたえ」のコンボ継続体験が、職業切替をまたいだ先行入力を前提にしている。ADR-0007 R5 で明示規定。ClassStateMachine が Flush を呼ぶ誘惑は合理的に見えるが、設計意図と反する。"
    adr: docs/architecture/adr-0007-combo-input-buffer.md
    added: 2026-04-29

  - pattern: flush_on_non_gsm_caller
    status: proposed
    description: "IComboBuffer.Flush() を Game State Machine (GSM) 以外から呼ばない。AbilityExecutor / ClassStateMachine / CharacterController2D 等は Flush を呼ぶ権限を持たない。Flush はサイレントなバッファ消滅を引き起こすため、GSM のみが death/respawn/level-reset タイミングで呼出す。"
    why: "Flush 誤用はプレイヤーの入力が無音で失われるデバッグ困難な障害を引き起こす。IComboBuffer インターフェースに Flush() を残すが、呼び出し権限を単一箇所（GSM）に集約する。#if DEVELOPMENT_BUILD でログ出力し誤用を早期検出。"
    adr: docs/architecture/adr-0007-combo-input-buffer.md
    added: 2026-04-29

  - pattern: direct_combo_buffer_array_access
    status: proposed
    description: "ComboInputBuffer の内部配列（_actionNames[] / _timestamps[] / _consumed[]）に外部から直接アクセスしてはいけない。IComboBuffer interface 経由（TryConsume / Flush）のみ許可。"
    why: "ADR-0007 が定義する combo_buffer_state の write authority を combo-input-buffer-only に限定するため。外部から consumed フラグを操作すると TryConsume の消費保証が崩れる。"
    adr: docs/architecture/adr-0007-combo-input-buffer.md
    added: 2026-04-29

  - pattern: circular_combo_next_reference
    status: proposed
    description: "ClassAbilityData.ComboNext が自分自身（A.ComboNext = A）または循環参照（A.ComboNext = B, B.ComboNext = A）を形成してはいけない。ComboNext を辿るループの終端は null（=コンボ終了）のみ。"
    why: "循環参照はコンボ継続ロジック（TickCurrentAbility の ComboNext チェック）で無限ループを引き起こす。ADR-0008 R6 で ComboNext != _currentAbility の実行時ガードを規定。Unity のオブジェクト比較は == null / != null を使用（is null 禁止、null object equality の Unity MonoBehaviour 挙動差異のため）。"
    adr: docs/architecture/adr-0008-class-abilities-system.md
    added: 2026-04-29

  - pattern: ability_string_action_name_gate
    status: proposed
    description: "Gate & Lock レベルデータ（ゲートの開閉条件）に IAbilityExecutor.HasAbility(string actionName) を使ってはいけない。IAbilityExecutor.HasCapability(AbilityCapability) + AbilityCapability [Flags] enum を使うこと。"
    why: "D2 決定: 職業固有の ActionName（'phase_step' 等）と Gate & Lock の機能分類（Dash）が一致しない場合にゲートが開かない障害が生じる。AbilityCapability enum は職業実装と Gates をデカップリングし、4 職目（ActionName が既存と異なる）の追加をコード変更ゼロで対応可能にする。"
    adr: docs/architecture/adr-0008-class-abilities-system.md
    added: 2026-04-29

  - pattern: enemy_rigidbody_direct_write_tier1
    status: proposed
    description: "Tier 1 以降の enemy 実装で Rigidbody2D.AddForce / Rigidbody2D.linearVelocity / Rigidbody2D.position 等を直接 write してはいけない。enemy knockback は ICharacterMotor.RequestImpulse 経由（EnemyController : ICharacterMotor 実装）のみ許可。Tier 0 の DummyEnemy.linearVelocity 直代入は throwaway code として明示的に例外扱い。"
    why: "external_motor_state_write forbidden pattern（ADR-0002）は player motor だけでなく enemy motor にも適用される。ICharacterMotor 抽象を enemy にも適用することで (a) Solver 権威性保証、(b) Box2D v3 マルチスレッド安全性、(c) 状態観測 API（IsGrounded / Velocity 等）の共通化、(d) replay 安全性が enemy にも拡張される。ADR-0009 Migration Plan で Tier 1 移行時の明示的置き換えを規定。"
    adr: docs/architecture/adr-0009-combat-system.md
    added: 2026-04-29

  - pattern: hit_confirmed_non_combat_hitstop
    status: proposed
    description: "HitConfirmed event の subscriber（VFX System / Audio System 等）が ICharacterMotor.ApplyHitstop を呼んではいけない。ApplyHitstop の呼出し権限は CombatSystem のみ。"
    why: "hitstop_attacker_delivery api_decision: CombatSystem が唯一の ApplyHitstop 呼出し元として確定（ADR-0009 Thin Mediator 決定）。VFX / Audio subscriber が独立に ApplyHitstop を呼ぶと、同 motor への複数呼出しが ADR-0002 Mathf.Max で意図せず長い hitstop を生む。デバッグが困難な hit feel 劣化につながる。"
    adr: docs/architecture/adr-0009-combat-system.md
    added: 2026-04-29

