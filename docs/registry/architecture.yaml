    write_access: character-controller-2d-only
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""

  - state: motor_state
    status: proposed
    owner_system: character-controller-2d
    adr: docs/architecture/adr-0002-character-controller-motor.md
