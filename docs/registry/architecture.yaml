      - vfx-system           # HitData.WorldPosition / HitNormal で hit VFX を発火
      - audio-system-future  # HitData.SourceAbility.SfxOnHit cue で hit SE を再生
    adr: docs/architecture/adr-0008-class-abilities-system.md
    signal_signature: |
      AbilityExecutor C# event:
        HitConfirmed(HitData hitData) : event Action<HitData>
            — 1 ability execution 中に同一 Collider2D への重複発火なし (_hitThisExecution HashSet で保証)
            — Physics2D.OverlapBoxNonAlloc で検出した valid hit 1 件ごとに 1 回発火
      HitData (readonly struct, Game.Core.asmdef):
        WorldPosition   : Vector2          — hit 点ワールド座標
        ActionName      : string           — "attack" 等
        HitNormal       : Vector2          — AttackerFacing の Vector2 化（+1/-1 x 成分）。OverlapBoxNonAlloc の接触法線ではない。knockback 方向 = HitNormal * KnockbackImpulse
        HitCollider     : Collider2D       — 被攻撃側コライダー
        SourceAbility   : ClassAbilityData — D1: Combat System が Damage / HitstopSec 等を直接読む
        AttackerFacing  : Vector2          — D1: ノックバック方向 (+1/-1 の Facing を Vector2 化)
    referenced_by:
      - docs/architecture/adr-0008-class-abilities-system.md
      - docs/architecture/adr-0009-combat-system.md
    added: 2026-04-29
    revised: 2026-04-29   # ADR-0009 referenced_by 追加, HitNormal は AttackerFacing であることを明記

  - contract: damage_receiver_contract
    status: proposed
    pattern: direct_call
    producer: combat-system
    consumers:
      - dummy-enemy           # Tier 0: DummyEnemy.TakeDamage（1-hit disable + linearVelocity knockback）
      - health-component      # Tier 1: HealthComponent.TakeDamage（HP 減算 + RequestImpulse + HealthChanged event）
      - boss-future           # ボス等の specialized enemy が IDamageReceiver 実装
    adr: docs/architecture/adr-0009-combat-system.md
    signal_signature: |
      IDamageReceiver (interface, Game.Core.asmdef, Game.Core.Combat namespace):
        TakeDamage(float damage, Vector2 knockbackImpulse) : void
            — damage: ベースダメージ値（Tier 0 DummyEnemy は無視、Tier 1 HealthComponent が防御計算）
            — knockbackImpulse: HitNormal * ClassAbilityData.KnockbackImpulse（CombatSystem が算出済み）
            — knockbackImpulse == Vector2.zero の場合はノックバックなし（ボス戦フェーズ等に使用可）
            — 呼出元: CombatSystem.OnHitConfirmed のみ（per-hit 1 回、GetComponent 経由）
      Tier 0 DummyEnemy 実装:
        _rb.linearVelocity = knockbackImpulse  — Rigidbody2D.linearVelocity 直代入（Tier 0 のみ）
        gameObject.SetActive(false)            — 1-hit KO
      Tier 1 HealthComponent 実装:
        CurrentHp -= damage                    — 防御値計算は Health & Damage System ADR で規定
        _motor.RequestImpulse(knockbackImpulse) — ICharacterMotor 経由（external_motor_state_write 準拠）
        HealthChanged event 発火               — HUD 更新
    referenced_by:
      - docs/architecture/adr-0009-combat-system.md
    added: 2026-04-29
    revised: ""

  - contract: ability_capability_query
    status: proposed
