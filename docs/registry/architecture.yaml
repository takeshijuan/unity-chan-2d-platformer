# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: class-switch-system
    status: active
    budget_ms: 0.8
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    notes: |
      Internal breakdown: SpriteLibrary swap 0.3ms + state mutation/color assign 0.05ms +
      AudioSource.PlayOneShot 0.1ms + AbilityExecutor.Configure 0.2ms +
      event invoke 0.05ms + buffer 0.1ms.
      Project total frame budget (60fps target, 16.6ms total) is defined in
      .claude/docs/technical-preferences.md but not yet ADR-formalized.
    referenced_by:
      - docs/architecture/adr-0001-class-switch-architecture.md
    added: 2026-04-27
    revised: ""

  - system: character-controller-2d
    status: proposed
    budget_ms: 0.5
    cycle: FixedUpdate
    adr: docs/architecture/adr-0002-character-controller-motor.md
    notes: |
      Internal breakdown (per FixedUpdate, warm path):
        input + intent calc           0.05ms
        gravity + impulse apply       0.05ms
        Cast x 4-6 (horiz/vert/wall)  0.20ms
        MovePosition + SyncTransforms 0.15ms
        state update + event invoke   0.05ms
        ─────────────────────────────────
        total                         0.50ms
      Cold path (first 10 FixedUpdate, Box2D v3 multithread init): allow up to 0.8ms.
      Project Physics budget (.claude/docs/technical-preferences.md) is 2ms total —
      motor occupies 1/4 of the Physics envelope.
      GC.Alloc target: 0 byte / FixedUpdate (RaycastHit2D[] pre-allocated in Awake).
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""

  - system: vfx-system
    metric: vfx_publisher_play_cue
    status: proposed
    budget_ms: 0.2
    cycle: per-event
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    notes: |
      IVFXPublisher.PlayCue hot path budget per event:
        pool.Pop() / Stack lookup       0.02-0.05ms
        Transform.position assign       0.01ms
        ParticleSystem.Play()           0.02-0.05ms
        ColorWashController.Begin()     0.02ms (class_switch_orb_burst のみ)
        active count++ / VfxHandle Id   0.01ms
        ─────────────────────────────────
        p99 target                      ≤ 0.20ms
      GC.Alloc target: 0 byte / call (VfxCueArgs is readonly struct, no closure capture).
      Validation Gate G2: Profiler EditMode で 1000 回 / 60s 連続発火、p99 ≤ 0.2ms 実測。
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

  - system: vfx-system
    metric: vfx_total_per_frame
    status: proposed
    budget_ms: 1.5
    cycle: Update + LateUpdate (per-frame)
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    notes: |
      Steam Deck 1080p worst-case VFX rendering envelope:
        Active emitters update (20 active)        ~0.5ms
        Color Wash quad fragment shader           ~0.1-0.3ms
        Pool dequeue / spawn (worst frame, 9 events) ~0.5ms (= 9 × 0.05ms PlayCue overhead)
        ─────────────────────────────────────────────
        target                                    ≤ 1.5ms
      Project rendering budget（technical-preferences.md）は 6ms total。VFX は 1/4 envelope。
      Validation Gate G5: Steam Deck 実機で boss scene + 20 emitter で実測。
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

