    notes: "ClassStateMachine (ADR-0001) は職業間受け渡し確認に TryConsume を使用。AbilityExecutor (ADR-0008) は TryConsume で消費。Flush は Game State Machine のみ呼出（forbidden_pattern: flush_on_non_gsm_caller）。ExecutionOrder: consumers は > -80 に設定すること（ADR-0007 R11）"

  - state: ability_executor_execution_state
