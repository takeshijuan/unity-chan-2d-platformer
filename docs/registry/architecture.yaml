# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: class-switch-system
    status: active
    budget_ms: 0.8
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    notes: |
      Internal breakdown: SpriteLibrary swap 0.3ms + state mutation/color assign 0.05ms +
      AudioSource.PlayOneShot 0.1ms + AbilityExecutor.Configure 0.2ms +
      event invoke 0.05ms + buffer 0.1ms.
      Project total frame budget (60fps target, 16.6ms total) is defined in
      .claude/docs/technical-preferences.md but not yet ADR-formalized.
