# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: class_switch_notification
    status: active
    pattern: csharp_event
    producer: class-switch-system
    consumers:
      - hud
      - ability-executor
      - vfx-system-future
      - audio-system-future
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    signal_signature: "ClassChanged(ClassDefinition newClass) — C# event Action<ClassDefinition>; also exposed as UnityEvent<ClassDefinition> for inspector-driven hooks"
    referenced_by:
      - docs/architecture/adr-0001-class-switch-architecture.md
    added: 2026-04-27
    revised: ""

  - contract: motor_intent_command
    status: proposed
    pattern: direct_call
    producer: ability-executor
    consumers:
      - character-controller-2d
    adr: docs/architecture/adr-0002-character-controller-motor.md
    signal_signature: |
      ICharacterMotor methods (synchronous, FixedUpdate-deferred):
        RequestImpulse(Vector2 impulse)                      — 1 frame additive
        OverrideGravity(float multiplier, float durationSec) — multiplier 後勝ち、durationSec max 合成
        LockHorizontalControl(float durationSec)             — 長い方優先で合成
        ApplyHitstop(float durationSec)                      — 自身 Solver 停止 (CD1 Tier 0 内蔵)
        SetFacing(Facing direction)                          — 向き強制
    additional_consumers_future:
      - combat-system        # ノックバック (RequestImpulse) / 被ダメ硬直 (LockHorizontalControl) / Hitstop
      - class-switch-system  # 切替 invariant 維持時の SetFacing / 状態 read のみ
      - enemy-ai-future      # 敵側で同 motor 抽象を再利用候補
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""
    notes: "API 名は ADR-0002 Validation Gate V1 通過後に確定 revise"

  - contract: motor_event_notification
    status: proposed
    pattern: csharp_event
    producer: character-controller-2d
    consumers:
      - ability-executor
      - animator-driver
      - vfx-system-future
      - audio-system-future
    adr: docs/architecture/adr-0002-character-controller-motor.md
    signal_signature: |
      ICharacterMotor events (C# event Action<...>):
        Landed(Vector2)         — arg: impact velocity (着地時のみ)
        JumpStarted              — no args
        WallTouched(Vector2)    — arg: wall normal
        HitstopApplied(float)   — arg: duration sec
        StateChanged(MotorState) — arg: 新 state (Grounded/Airborne/WallSliding/Pinned)
      `Grounded` event は廃案 — Landed(Vector2) で着地検出は十分、IsGrounded プロパティとの命名衝突回避
    referenced_by:
      - docs/architecture/adr-0002-character-controller-motor.md
    added: 2026-04-27
    revised: ""

