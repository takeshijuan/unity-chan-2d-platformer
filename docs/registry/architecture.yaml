    added: 2026-04-27
    revised: ""

  - purpose: vfx_addressables_key_form
    status: proposed
    api: "AssetReferenceGameObject in VfxCueDefinition (ScriptableObject SerializeField)"
    not: "enum VfxCueId（cue 追加でコード編集必須）/ string addressable key（typo がコンパイル通過、Find References 不能）"
    adr: docs/architecture/adr-0003-vfx-system-boundary.md
    reason: "型安全性 + Find References 動作 + refactor-rename 動作 + デザイナーが SO asset 作成のみで cue 追加可能（コード編集不要）。technical-preferences.md「Magic numbers — ScriptableObject に配置」と同思想。"
    referenced_by:
      - docs/architecture/adr-0003-vfx-system-boundary.md
    added: 2026-04-27
    revised: ""

  - purpose: save_serialization_library
    status: proposed
