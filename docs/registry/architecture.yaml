    status: active
    owner_system: class-switch-system
    adr: docs/architecture/adr-0001-class-switch-architecture.md
    interface: "ClassStateMachine.CurrentClass (read-only ClassDefinition property) + ClassStateMachine.ClassChanged event (Action<ClassDefinition>) + UnityEvent<ClassDefinition> inspector hook"
    write_access: class-switch-system-only
    referenced_by:
